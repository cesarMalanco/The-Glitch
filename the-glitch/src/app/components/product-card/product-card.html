<div class="col">
    <div class="card h-100 shadow-lg rounded-3">
        <img *ngIf="product.image_url" [src]="'http://localhost:3000/uploads/' + product.image_url" [alt]="product.name"
            class="card-img-top">

        <div class="card-body d-flex flex-column">
            <h5 class="card-title">{{product.name}}</h5>
            <p class="card-text mb-1 text-muted">{{product.category}}</p>
            <p class="card-text mb-1 text-muted" style="font-style: italic;">Stock: {{product.stock}}</p>
            <p class="card-text mb-1"><strong>{{product.price | currency}}</strong></p>

            <div class="mb-3">
                <span class="badge" [ngClass]="product.stock > 0 ? 'text-bg-success' : 'text-bg-danger'">
                    {{ product.stock > 0 ? 'Disponible' : 'Sin Stock' }}
                </span>
            </div>

            <div class="card-body-buttons mt-auto">
                <div class="d-flex gap-2">
                    <a [routerLink]="['/catalog', product.id]"
                        class="btn btn-primary flex-grow-1 d-flex align-items-center justify-content-center">
                        Ver detalles
                    </a>

                    <button (click)="onAdd.emit(product)"
                        class="btn btn-outline-primary d-flex align-items-center justify-content-center"
                        [disabled]="product.stock <= 0 || isMaxReached" style="width: 45px; height: 45px;"
                        title="Añadir al carrito">
                        <i class="bi bi-cart-plus fs-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
