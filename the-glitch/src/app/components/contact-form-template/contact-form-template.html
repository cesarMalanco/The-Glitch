<form #contactForm="ngForm" (ngSubmit)="onSubmit(contactForm)" class="needs-validation">

    <div class="mb-3">
        <label class="form-label">Nombre Completo</label>
        <input type="text" name="name" class="form-control" [(ngModel)]="contactData.name" required
            placeholder="Tu nombre" #name="ngModel" [ngClass]="{'is-invalid': name.invalid && name.touched}">
        <div class="invalid-feedback">El nombre es obligatorio.</div>
    </div>

    <div class="mb-3">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" name="email" class="form-control" [(ngModel)]="contactData.email" required email
            placeholder="ejemplo@correo.com" #email="ngModel"
            [ngClass]="{'is-invalid': email.invalid && email.touched}">
        <div class="invalid-feedback">Ingresa un correo válido.</div>
    </div>

    <div class="mb-3">
        <label class="form-label">Asunto</label>
        <input type="text" name="subject" class="form-control" [(ngModel)]="contactData.subject" required
            placeholder="¿En qué podemos ayudarte?" #subject="ngModel"
            [ngClass]="{'is-invalid': subject.invalid && subject.touched}">
    </div>

    <div class="mb-4">
        <label class="form-label">Mensaje</label>
        <textarea name="message" class="form-control" rows="5" [(ngModel)]="contactData.message" required minlength="10"
            #message="ngModel" [ngClass]="{'is-invalid': message.invalid && message.touched}"
            placeholder="Escribe aquí tu mensaje..."></textarea>
        <div class="invalid-feedback">El mensaje debe tener al menos 10 caracteres.</div>
    </div>

    <div class="d-grid">
        <button type="submit" class="btn btn-primary btn-lg" [disabled]="contactForm.invalid">
            <i class="bi bi-send me-2"></i> Enviar Mensaje
        </button>
    </div>

</form>
