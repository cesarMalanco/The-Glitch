<div class="card border shadow-none mb-3">
    <div class="card-body">
        <div class="d-flex align-items-center border-bottom pb-3">
            <div class="me-4">
                <img [src]="'http://localhost:3000/uploads/' + p.image_url" class="rounded"
                    style="width: 80px; height: 80px; object-fit: cover;">
            </div>
            <div class="flex-grow-1">
                <h5 class="text-truncate font-size-18 mb-1">
                    <a [routerLink]="['/catalog', p.id]" class="text-dark">{{p.name}}</a>
                </h5>
                <p class="text-muted mb-0 small">{{p.category}}</p>
            </div>
            <div class="flex-shrink-0 ms-2">
                <button (click)="onDeleteAll.emit(p.id)" class="btn btn-light text-danger" title="Eliminar todo">
                    <i class="bi bi-trash fs-5"></i>
                </button>
            </div>
        </div>

        <div class="row mt-3 text-center text-md-start align-items-center">
            <div class="col-md-4">
                <p class="text-muted mb-1 small">Precio</p>
                <h5 class="mb-0">{{p.price | currency}}</h5>
            </div>
            <div class="col-md-4">
                <p class="text-muted mb-1 small">Cantidad</p>
                <div class="d-flex align-items-center justify-content-center justify-content-md-start gap-2">
                    <button (click)="onRemove.emit(p.id)" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-dash"></i>
                    </button>

                    <span class="badge bg-light text-dark border py-2 px-3">
                        {{p.quantity || 1}}
                    </span>

                    <button (click)="onAdd.emit(p)" class="btn btn-sm btn-outline-secondary"
                        [disabled]="p.quantity >= p.stock">
                        <i class="bi bi-plus"></i>
                    </button>

                    <small *ngIf="p.quantity >= p.stock" class="text-danger d-block mt-1">
                        Límite de stock alcanzado
                    </small>
                </div>
            </div>
            <div class="col-md-3">
                <p class="text-muted mb-1 small">Total</p>
                <h5 class="text-primary">{{ (p.price * (p.quantity || 1)) | currency }}</h5>
            </div>
        </div>
    </div>
</div>
