<h2 class="subtitle px-4 mt-5 mb-4">Catálogo</h2>

<div class="container-fluid px-5" style="padding: 20px">
    <div class="row mb-4">
        <div class="col">
            <div class="btn-group shadow-sm" role="group">
                <button *ngFor="let cat of categories()" (click)="setCategory(cat)" class="btn"
                    [class.btn-primary]="activeCategory() === cat"
                    [class.btn-outline-primary]="activeCategory() !== cat">
                    {{cat}}
                </button>
            </div>
            <span class="ms-3 text-muted small">
                Mostrando: <strong>{{ filteredProducts().length }}</strong> productos
            </span>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
        <div class="col" *ngFor="let p of filteredProducts()">
            <div class="card h-100 shadow-lg rounded-3">
                <img *ngIf="p.image_url" [src]="'http://localhost:3000/uploads/' + p.image_url" [alt]="p.name"
                    class="card-img-top">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{p.name}}</h5>
                    <p class="card-text mb-1 text-muted">{{p.category}}</p>
                    <p class="card-text mb-1 text-muted" style="font-style: italic;">Stock: {{p.stock}}</p>
                    <p class="card-text mb-1"><strong>{{p.price | currency}}</strong></p>

                    <div class="mb-3">
                        <span class="badge" [ngClass]="p.stock > 0 ? 'text-bg-success' : 'text-bg-danger'">
                            {{ p.stock > 0 ? 'Disponible' : 'Sin Stock' }}
                        </span>
                    </div>

                    <div class="card-body-buttons mt-auto">
                        <div class="d-flex gap-2">
                            <a [routerLink]="['/catalog', p.id]"
                                class="btn btn-primary flex-grow-1 d-flex align-items-center justify-content-center">
                                Ver detalles
                            </a>

                            <button (click)="addToCart(p)"
                                class="btn btn-outline-primary d-flex align-items-center justify-content-center"
                                [disabled]="p.stock <= 0 || isMaxStockReached(p)" style="width: 45px; height: 45px;"
                                title="Añadir al carrito">
                                <i class="bi bi-cart-plus fs-5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
