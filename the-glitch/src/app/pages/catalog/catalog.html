<h2 class="subtitle px-4 mt-5 mb-4">Catálogo</h2>

<div class="container-fluid px-5" style="padding: 20px">

    <app-category-filter 
        [categories]="categories()" 
        [activeCategory]="activeCategory()"
        [totalProducts]="filteredProducts().length"
        (onCategoryChange)="setCategory($event)">
    </app-category-filter>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
        <div class="col" *ngFor="let p of filteredProducts()">
            <app-product-card 
                [product]="p" [isMaxReached]="isMaxStockReached(p)" (onAdd)="addToCart($event)">
            </app-product-card>
        </div>
    </div>
</div>
