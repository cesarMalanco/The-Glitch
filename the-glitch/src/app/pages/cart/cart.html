<div class="container py-5">
    <div class="row g-4">
        <div class="col-lg-8">
            <h4 class="mb-4">Tu Carrito ({{ items().length }})</h4>

            <app-cart-item *ngFor="let producto of items()" [p]="producto" (onRemove)="remove($event)"
                (onAdd)="addOne($event)" (onDeleteAll)="removeAll($event)">
            </app-cart-item>

            <div *ngIf="items().length === 0" class="alert alert-info">
                ¡Tu carrito de está vacío, agrega unos cuantos productos!
            </div>

            <div class="mt-4">
                <a routerLink="/catalog" class="btn btn-link text-muted p-0">
                    <i class="bi bi-arrow-left me-1"></i> Continuar comprando
                </a>
            </div>
        </div>

        <div class="col-lg-4">
            <app-order-summary 
                [totalValue]="total()" [isCartEmpty]="items().length === 0">
            </app-order-summary>
        </div>
    </div>
</div>
